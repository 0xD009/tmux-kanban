hosts:
  - name: local
    local: true
  - name: gpu-a
    ssh: user@gpu-a

kanban:
  columns:
    - Idle
    - Working
    - Need Review

main_agent:
  enabled: true
  host: local
  session: tmux-kanban-main
  # Optional conductor session used by tmux-kanban-review skill + JSON CLI abilities.
  agent: codex # codex or claude-code
  command: codex
  args: []

agent_mesh:
  enabled: false
  shared_short_agent: true
  default_agent: codex
  # Skill files constrain Codex/Claude role backends.
  skill_root: mesh-skills
  memory_root: ""
  policies:
    - name: review-permission
      role: review-permission
      scope: session
      backend: codex # builtin, codex, claude-code, hermes, or command
      skill: review-permission
      agent: codex
      enabled: true
    - name: review-advice
      role: review-advice
      scope: session
      backend: codex
      skill: review-advice
      agent: codex
      enabled: true
    - name: dispatcher
      role: dispatcher
      scope: session
      backend: codex
      skill: dispatcher
      agent: codex
      enabled: true
    - name: session-link
      role: session-link
      scope: host
      backend: codex
      skill: session-link
      agent: codex
      enabled: true
  mail:
    enabled: true
    dir: ""

hermes:
  enabled: false
  auto_review: false
  done_advice: false
  auto_done: false
  idle_advice: false
  auto_idle: false
  command: hermes
  args:
    - --oneshot
  timeout_seconds: 120
  # Empty uses ~/.local/state/tmux-kanban/hermes-worklog.jsonl
  work_log: ""
  scopes:
    # Later matching scopes override earlier/global settings.
    - host: all
      auto_review: false
    - host: gpu-a
      enabled: true
      auto_done: false
      auto_idle: false
    - host: local
      session: tmux-kanban-main
      enabled: true
      auto_done: true

notification:
  qq_enabled: false
  # Send Hermes auto-review decisions to QQ for audit: off, uncertain, or all.
  # uncertain only sends unactionable/failed decisions that may need human review.
  auto_review_audit_qq: off
  # Terminal bell/title NEED REVIEW alert. Off by default because the TUI already shows review state.
  terminal_review: false

debug:
  snapshot_dir: ""
